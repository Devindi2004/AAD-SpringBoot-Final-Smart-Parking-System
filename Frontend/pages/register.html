<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkSmart — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Cabinet+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<div class="page-layout">

    <!-- ===== LEFT PANEL ===== -->
    <div class="left-panel" id="leftPanel">

        <a href="../index.html" class="logo">
            <div class="logo-icon">🅿</div>
            <div class="logo-text">Park<span>Smart</span></div>
        </a>

        <div class="role-hero">
            <div class="role-tag" id="leftRoleTag"></div>
            <div class="hero-title" id="leftHeroTitle"></div>
            <div class="hero-sub" id="leftHeroSub"></div>
        </div>

        <div class="benefit-list" id="benefitList"></div>

        <div class="step-indicator">
            <div class="step-dot done">✓</div>
            <div class="step-line"></div>
            <div class="step-dot active">2</div>
            <div class="step-line"></div>
            <div class="step-dot next">3</div>
        </div>
        <div style="font-size:11px; color:var(--text-muted);">
            Step 2 of 3 — <span id="stepLabel"></span>
        </div>

        <div class="footer-left">ParkSmart · Urban Parking Intelligence · <span>Colombo, Sri Lanka</span></div>

    </div>

    <!-- ===== RIGHT PANEL — REGISTER ===== -->
    <div class="right-panel">
        <div class="register-box">

            <a class="back-link" onclick="history.back()">← Back to Sign In</a>

            <div class="form-role-tag" id="formRoleTag"></div>
            <div class="form-title" id="formTitle">Create Account</div>
            <div class="form-sub">Fill in your details below to get started</div>

            <div class="error-msg" id="errorMsg">
                <span>⚠</span>
                <span id="errorText">Please fix the errors below.</span>
            </div>

            <!-- Personal Info -->
            <div class="form-section-label">Personal Information</div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control" id="firstName" placeholder="John" autocomplete="given-name">
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="lastName" placeholder="Doe" autocomplete="family-name">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="regPhone" placeholder="+94 77 123 4567" autocomplete="tel">
            </div>

            <!-- Password -->
            <div class="form-section-label">Security</div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="password-wrap">
                    <input type="password" class="form-control" id="regPassword" placeholder="Create a strong password" autocomplete="new-password" oninput="checkStrength()">
                    <button class="toggle-pass" onclick="togglePass('regPassword', this)" type="button">👁</button>
                </div>
                <div class="password-strength" id="strengthBars">
                    <div class="strength-bar" id="sb1"></div>
                    <div class="strength-bar" id="sb2"></div>
                    <div class="strength-bar" id="sb3"></div>
                    <div class="strength-bar" id="sb4"></div>
                </div>
                <div class="strength-label" id="strengthLabel">Enter a password</div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="password-wrap">
                    <input type="password" class="form-control" id="regConfirm" placeholder="Repeat your password" autocomplete="new-password">
                    <button class="toggle-pass" onclick="togglePass('regConfirm', this)" type="button">👁</button>
                </div>
            </div>

            <div class="terms-row">
                <input type="checkbox" id="termsCheck">
                <label for="termsCheck">
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </label>
            </div>

            <button class="btn-register" id="submitBtn" onclick="handleRegister()">
                Create Account &nbsp;→
            </button>

            <div class="signin-row">
                Already have an account? <a href="../index.html">Sign In</a>
            </div>

        </div>
    </div>

</div>

<script src="../js/api/api.config.js"></script>
<script src="../js/api/user.api.js"></script>

<script src="../js/pages/register.js"></script>
</body>
</html>
